services:
  - type: web
    name: mentytarget-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MENTY_MAX_CANDIDATES
        value: "100"
      - key: MENTY_HTTP_TIMEOUT
        value: "30"
